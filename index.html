<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>homework</title>
    <link rel="icon" href="favicon.png">
    <style>
        .wrap{
            width: 100%;
            height: 80vh;
            background-color: transparent;
            display: flex;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        button{
            width: 550px;
            height: 70px;
            background-color: black;
            display: flex;
            font-size: 150%;
            border: 1px solid transparent;
            border-radius: 7px;
            color: white;
            align-items: center;
            text-align: center;
            justify-content: center;
            font-weight: 800;
        }
        button:hover{
            margin-top: 0.1%;
            background-color: rgb(36, 36, 36);
        }
    </style>
</head>
<body>
    <script src="./main.js"></script>
    <div class="wrap">
        <button type="button" onclick="button()">відкрити консоль через кнопку...</button>
    </div>
</body>
</html>
