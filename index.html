<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>homework</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-color: rgb(178, 178, 178);
        }
        .wrap{
            width: 100%;
            height: 100vh;
            display: flex;
            background-color: transparent;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .main{
            width: 600px;
            height: 750px;
            background-color: rgb(101, 101, 101);
            border-radius: 7px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
        }
        .text{
            width: 100%;
            height: 25%;
            background-color: transparent;
            text-align: center;
            color: black;
            font-size: 350%;
            font-weight: 600;
            justify-content: center;
        }
        .username{
            width: 80%;
            height: 7%;
            display: flex;
            background-color: transparent;
            border-radius: 7px;
            display: flex;
            font-size: 200%;
            font-weight: 600;
            justify-content: space-between;
            
        }
        .login{
            width: 80%;
            height: 7%;
            display: flex;
            background-color: transparent;
            border-radius: 7px;
            display: flex;
            font-size: 200%;
            font-weight: 600;
            justify-content: space-between;
        }
        .password{
            width: 80%;
            height: 7%;
            display: flex;
            background-color: transparent;
            border-radius: 7px;
            display: flex;
            font-size: 200%;
            font-weight: 600;
            justify-content: space-between;
        }
        #idUsername{
            width: 85%;
            height: 100%;
            background-color: rgb(66, 66, 66);
            border: solid rgb(66, 66, 66);
            border-radius: 5px;
            color: black;
        }
        #idLogin{
            width: 85%;
            height: 100%;
            background-color: rgb(66, 66, 66);
            border: solid rgb(66, 66, 66);
            border-radius: 5px;
            color: black;
        }
        #idPassword{
            width: 85%;
            height: 100%;
            background-color: rgb(66, 66, 66);
            border: solid rgb(66, 66, 66);
            border-radius: 5px;
            color: black;
        }
        button{
            width: 10%;
            height: 100%;
            background-color: rgb(66, 66, 66);
            border-radius: 5px;
            border: solid rgb(66, 66, 66);
            color: black;
        }
        button:hover{
            background-color: rgb(62, 62, 62);
            margin-top: 1px;
        }
        span.account{
            font-size: 200%;
        }
        .submit{
            width: 80%;
            height: 7%;
            display: flex;
            background-color: rgb(66, 66, 66);
            border-radius: 7px;
            justify-content: center;
            align-items: center;
            font-size: 200%;
            font-weight: 600;
            text-align: center;
        }
        .submit:hover{
            background-color: rgb(62, 62, 62);
        }
        a{
            color: rgb(52, 52, 52);
            font-size: large;
            font-weight: 600;
        }
        .forgot{
            width: 100%;
            height: 1%;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin-top: 1%;
        }
    </style>
</head>
<body>
    <script src="https://kit.fontawesome.com/cdf3567dc1.js" crossorigin="anonymous"></script>
    <script src="./main.js"></script>
    <div class="wrap">
        <div class="main">
            <div class="text"><span class="account"><i class="fa-solid fa-user"></i></span><br>Log in</div>
            <div class="username" id="UserName"><input type="text" id="idUsername" placeholder="введіть імя користувача">     <button onclick="submitName()"><i class="fa-solid fa-arrow-right"></i></button></div>
            <div class="login"><input type="text" id="idLogin" placeholder="введіть логін користувача">     <button onclick="submitLogin()"><i class="fa-solid fa-arrow-right"></i></button></div>
            <div class="password"><input type="text" id="idPassword" placeholder="введіть пароль користувача">     <button onclick="submitPassword()"><i class="fa-solid fa-arrow-right"></i></button></div>
            <div class="forgot"><a href="https://wrouruy.github.io/homeworkSecond/">Забули пароль?</a></div>
            <div class="submit" onclick="submit()">log in</div>
        </div>
    </div>
</body>
</html>
